<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What should I watch?</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0e0e10;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 48px 20px;
            line-height: 1.5;
        }

        main {
            max-width: 880px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 28px;
            font-size: 14px;
        }

        form {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        #query {
            flex: 1;
            background: #1a1a1d;
            border: 1px solid #2a2a2e;
            color: #f5f5f7;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s ease;
        }

        #query:focus { border-color: #6e6eff; }

        button {
            background: #6e6eff;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s ease;
        }

        button:hover:not(:disabled) { background: #5959ff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .example-chip {
            background: #1a1a1d;
            border: 1px solid #2a2a2e;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 400;
            transition: border-color 0.15s ease, color 0.15s ease;
        }

        .example-chip:hover {
            border-color: #6e6eff;
            color: #d0d0d8;
        }

        #status {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #2a2a2e;
            border-top-color: #6e6eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: -2px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error { color: #ff7a7a; }

        .message-box {
            background: #1a1a1d;
            border: 1px solid #2a2a2e;
            padding: 16px 20px;
            border-radius: 12px;
            color: #ccc;
            margin-bottom: 16px;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .movie-card {
            background: #1a1a1d;
            border: 1px solid #2a2a2e;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            transition: border-color 0.15s ease;
        }

        .movie-card:hover { border-color: #4a4a4e; }

        .poster {
            width: 140px;
            min-width: 140px;
            background: #0a0a0c;
            object-fit: cover;
            align-self: stretch;
        }

        .poster.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 32px;
        }

        .info {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .header-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .title {
            font-size: 17px;
            font-weight: 600;
            color: #f5f5f7;
        }

        .year {
            color: #888;
            font-weight: 400;
            font-size: 15px;
        }

        .rating {
            color: #f5c451;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .rating.unrated { color: #555; }

        .reason {
            color: #d8d8e0;
            font-size: 14px;
            font-style: italic;
            border-left: 2px solid #6e6eff;
            padding-left: 10px;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .chip {
            background: #2a2a2e;
            color: #aaa;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 11px;
        }

        .runtime {
            color: #777;
            font-size: 12px;
        }

        .plot {
            color: #b0b0b8;
            font-size: 13px;
            line-height: 1.55;
        }

        .cast {
            color: #888;
            font-size: 12px;
        }

        .cast strong {
            color: #aaa;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .movie-card { flex-direction: column; }
            .poster { width: 100%; min-width: 0; height: 240px; }
        }

        .footer {
            margin-top: 48px;
            text-align: center;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>
<main>
    <h1>What should I watch?</h1>
    <p class="subtitle">Describe what you're in the mood for.</p>

    <form id="form">
        <input id="query" type="text"
               placeholder="e.g. thriller with famous actors, not too scary"
               autocomplete="off" autofocus>
        <button id="submit" type="submit">Ask</button>
    </form>

    <div class="examples">
        <button type="button" class="example-chip">movie about dreams</button>
        <button type="button" class="example-chip">obscure underrated thrillers</button>
        <button type="button" class="example-chip">comedy AND horror</button>
        <button type="button" class="example-chip">the best fantasy movies</button>
        <button type="button" class="example-chip">bad rated romance</button>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <p class="footer">/askMe → SearchAiService → Gemini + your library</p>
</main>

<script>
    const form = document.getElementById('form');
    const queryInput = document.getElementById('query');
    const submitBtn = document.getElementById('submit');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    document.querySelectorAll('.example-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            queryInput.value = chip.textContent;
            form.requestSubmit();
        });
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const q = queryInput.value.trim();
        if (!q) return;

        resultsEl.innerHTML = '';
        statusEl.textContent = 'Thinking…';
        statusEl.className = 'loading';
        submitBtn.disabled = true;

        try {
            const res = await fetch('/askMe?query=' + encodeURIComponent(q));
            if (!res.ok) {
                const body = await res.text().catch(() => '');
                throw new Error(`${res.status} ${res.statusText}${body ? ' — ' + truncate(body, 200) : ''}`);
            }
            const data = await res.json();
            statusEl.textContent = '';
            statusEl.className = '';
            renderResult(data);
        } catch (err) {
            statusEl.textContent = 'Error: ' + err.message;
            statusEl.className = 'error';
        } finally {
            submitBtn.disabled = false;
        }
    });

    function renderResult(data) {
        const parts = [];

        if (data.message) {
            parts.push(`<div class="message-box">${escapeHtml(data.message)}</div>`);
        }

        const picks = data.picks || [];
        if (picks.length > 0) {
            parts.push('<div class="results">');
            for (const movie of picks) {
                parts.push(renderCard(movie));
            }
            parts.push('</div>');
        } else if (!data.message) {
            parts.push(`<div class="message-box">No picks returned.</div>`);
        }

        resultsEl.innerHTML = parts.join('');
    }

    function renderCard(m) {
        const poster = m.posterUrl
            ? `<img class="poster" src="${escapeHtml(m.posterUrl)}" alt="${escapeHtml(m.title || '')}" onerror="this.outerHTML='<div class=&quot;poster placeholder&quot;>🎬</div>'">`
            : `<div class="poster placeholder">🎬</div>`;

        const year = m.year != null ? `<span class="year">(${m.year})</span>` : '';
        const ratingHtml = m.tmdbRating != null && m.tmdbRating > 0
            ? `<span class="rating">★ ${m.tmdbRating.toFixed(1)}</span>`
            : `<span class="rating unrated">unrated</span>`;

        const genreChips = (m.genres || []).map(g => `<span class="chip">${escapeHtml(g)}</span>`).join('');
        const runtime = m.runtime ? `<span class="runtime">${m.runtime} min</span>` : '';
        const meta = (genreChips || runtime) ? `<div class="meta">${genreChips}${runtime}</div>` : '';

        const reason = m.reason ? `<div class="reason">${escapeHtml(m.reason)}</div>` : '';
        const plot = m.plot ? `<div class="plot">${escapeHtml(m.plot)}</div>` : '';
        const cast = (m.topCast && m.topCast.length > 0)
            ? `<div class="cast"><strong>Cast:</strong> ${escapeHtml(m.topCast.slice(0, 5).join(', '))}</div>`
            : '';

        return `
            <article class="movie-card">
                ${poster}
                <div class="info">
                    <div class="header-row">
                        <div class="title">${escapeHtml(m.title || 'Untitled')} ${year}</div>
                        ${ratingHtml}
                    </div>
                    ${reason}
                    ${meta}
                    ${plot}
                    ${cast}
                </div>
            </article>
        `;
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function truncate(s, n) {
        return s.length > n ? s.slice(0, n) + '…' : s;
    }
</script>
</body>
</html>
